{% extends 'myapp/base.html' %}

{% block content %}
<div class="container py-4">
    <h3 class="mb-4">
        {% if medicine %}Edit Medicine{% else %}Add Medicine{% endif %}
    </h3>

    <form method="POST">
        {% csrf_token %}

        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Name</label>
                <input type="text" name="name" class="form-control"
                    value="{{ medicine.name|default:'' }}" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>Manufacturer</label>
                <input type="text" name="manufacturer" class="form-control"
                    value="{{ medicine.manufacturer|default:'' }}" required>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Batch Number</label>
                <input type="text" name="batch_number" class="form-control"
                    value="{{ medicine.batch_number|default:'' }}" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>Expiry Date</label>
                <input type="date" name="expiry_date" class="form-control"
                    value="{{ medicine.expiry_date|date:'Y-m-d'|default:'' }}" required>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4 mb-3">
                <label>Price</label>
                <input type="number" step="0.01" name="price" class="form-control"
                    value="{{ medicine.price|default:'' }}" required>
            </div>

            <div class="col-md-4 mb-3">
                <label>Stock</label>
                <input type="number" name="stock_quantity" class="form-control"
                    value="{{ medicine.stock_quantity|default:'' }}" required>
            </div>

            <div class="col-md-4 mb-3">
                <label>Min Alert</label>
                <input type="number" name="min_stock_alert" class="form-control"
                    value="{{ medicine.min_stock_alert|default:'10' }}" required>
            </div>
        </div>

        <div class="mb-3">
            <label>Supplier</label>
            <select name="supplier" class="form-control">
                <option value="">Select Supplier</option>
                {% for supplier in suppliers %}
                <option value="{{ supplier.id }}"
                    {% if medicine and medicine.supplier and medicine.supplier.id == supplier.id %}selected{% endif %}>
                    {{ supplier.name }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label>Description</label>
            <textarea name="description" class="form-control">{{ medicine.description|default:'' }}</textarea>
        </div>

        <button class="btn btn-primary">Save Medicine</button>
        <a href="{% url 'medicine_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
