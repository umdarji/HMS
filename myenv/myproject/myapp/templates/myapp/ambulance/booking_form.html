{% extends 'myapp/base.html' %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0"><i class="fas fa-ambulance me-2"></i>Emergency Ambulance Request</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Patient Name</label>
                                <input type="text" name="patient_name" class="form-control" required
                                    placeholder="Name of patient">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Contact Phone</label>
                                <input type="text" name="contact_phone" class="form-control" required
                                    placeholder="Emergency contact">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Pickup Location</label>
                            <input type="text" name="from_location" class="form-control" required
                                placeholder="Address or Area">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Drop-off Location (Destination)</label>
                            <input type="text" name="to_location" class="form-control" value="Hospital Main Entrance"
                                required>
                        </div>

                        <div class="alert alert-info">
                            <small><i class="fas fa-info-circle"></i> An ambulance will be assigned by the dispatcher
                                after request creation.</small>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger btn-lg">Request Ambulance</button>
                            <a href="{% url 'ambulance_dashboard' %}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
